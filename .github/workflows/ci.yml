name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Use the newest available Ubuntu image

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false # Allow all Python versions to run even if one fails

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Cache pip dependencies for faster subsequent runs

    - name: Install project and development dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install ".[dev]"

    - name: Run tests with pytest
      run: |
        pytest --cov=mcpartools --cov-report=xml --cov-report=term-missing
      env:
        # Environment variables
        PYTHONPATH: "."

    - name: Run Flake8 linting
      run: |
        flake8 mcpartools/ tests/

    - name: Run check-manifest (verify package includes all necessary files)
      run: |
        check-manifest --verbose